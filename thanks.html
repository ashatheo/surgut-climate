<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #fdfdfd; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .box { max-width: 500px; }
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            margin-bottom: 25px; 
            color: #111;
        }
        p { 
            color: #444; 
            font-size: 1.2rem; 
            line-height: 1.5;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Спасибо за ваш отзыв!</h1>
        <p>Он отправлен на модерацию и скоро появится на сайте.</p>
        <p style="margin-top: 30px; opacity: 0.7; font-size: 1rem;">Сейчас вы будете перенаправлены на главную...</p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 4000); // Увеличил время до 4 секунд, чтобы человек успел прочитать
    </script>
</body>
</html>
